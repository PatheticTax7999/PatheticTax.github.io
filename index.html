// ─── STATE ───────────────────────────────────────────────────────────────────
let uid = null, unsubscribe = null, useLb = false;
let activeWorkout = null, workoutTimer = null, chartInstances = {};

let state = {
  todayGoals: [], tomorrowGoals: [], lastDate: null,
  routines: [], exerciseHistory: {},
  supplements: [], suppChecks: {},
  waterGoal: 2000, waterUnit: 'ml', waterLog: {},
  weightLog: []  // NEW: array of {date, weight} objects
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
const HOUR_START = 6, HOUR_END = 24, KG_TO_LB = 2.20462;
const uid2 = () => Math.random().toString(36).slice(2,9);
const fmtWeight = (kg,lb) => lb?`${(kg*KG_TO_LB).toFixed(1)} lb`:`${kg} kg`;
const getTime  = () => new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
const getDate  = () => new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
const getGreeting = () => { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; };
const getDayPct   = () => { const h=new Date().getHours()+new Date().getMinutes()/60; return Math.min(1,Math.max(0,(h-HOUR_START)/(HOUR_END-HOUR_START))); };
const fmtTimer = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const todayKey = () => new Date().toISOString().slice(0,10);

// ─── FIRESTORE ───────────────────────────────────────────────────────────────
async function saveToFirestore() {
  if (!uid) return;
  try {
    await setDoc(doc(db,"users",uid),{
      todayGoals:state.todayGoals, tomorrowGoals:state.tomorrowGoals, lastDate:state.lastDate,
      routines:state.routines, exerciseHistory:state.exerciseHistory, useLb,
      supplements:state.supplements, suppChecks:state.suppChecks,
      waterGoal:state.waterGoal, waterUnit:state.waterUnit, waterLog:state.waterLog,
      weightLog:state.weightLog
    });
  } catch(e){ console.error("Save error",e); }
}

function subscribeToFirestore() {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(doc(db,"users",uid),(snap)=>{
    if (snap.exists()) {
      const d = snap.data();
      const today = new Date().toDateString();

      // ── Goal roll-over (only affects todayGoals/tomorrowGoals, never routines/supplements) ──
      if (d.lastDate && d.lastDate!==today && d.tomorrowGoals?.length) {
        state.todayGoals=[...(d.todayGoals||[]).filter(g=>!g.done),...(d.tomorrowGoals||[]).map(g=>({...g,done:false}))];
        state.tomorrowGoals=[]; state.lastDate=today; saveToFirestore();
      } else {
        state.todayGoals=d.todayGoals||[]; state.tomorrowGoals=d.tomorrowGoals||[]; state.lastDate=d.lastDate||today;
      }

      // ── Routines & supplements: always load as-is, NEVER reset ──
      state.routines=d.routines||[];
      state.exerciseHistory=d.exerciseHistory||{};
      useLb=d.useLb||false;
      state.supplements=d.supplements||[];

      // ── suppChecks: only keep today's key + yesterday's to avoid bloat ──
      // Load all suppChecks from Firestore — do NOT wipe them
      state.suppChecks=d.suppChecks||{};

      state.waterGoal=d.waterGoal??2000;
      state.waterUnit=d.waterUnit||'ml';
      // Only keep today's water log entry
      const allWaterLog=d.waterLog||{};
      state.waterLog=allWaterLog;

      state.weightLog=d.weightLog||[];
    } else {
      state.lastDate=new Date().toDateString();
      saveToFirestore();
    }
    renderCurrentTab();
  });
}

// ─── AUTH ────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    uid=user.uid; subscribeToFirestore();
    document.getElementById("auth-screen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("user-avatar").textContent=user.displayName?.charAt(0).toUpperCase()||"?";
    document.getElementById("user-name").textContent=user.displayName||"User";
  } else {
    uid=null; if(unsubscribe){unsubscribe();unsubscribe=null;}
    document.getElementById("auth-screen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});
window.signInGoogle  = async()=>{ try{await signInWithPopup(auth,provider);}catch(e){console.error(e);} };

// ─── TAB NAV ─────────────────────────────────────────────────────────────────

window.switchTab = (tab) => {
  currentTab=tab;

};
function renderCurrentTab() {
  if (currentTab==="home")     renderHome();
  else if (currentTab==="fitness")  renderFitness();
  else if (currentTab==="health")   renderHealth();

}

// HOME PAGE

function updateWheel(p) {
  const svg=document.getElementById("wheel-svg"); if(!svg) return;
  const size=200,stroke=12,r=(size-stroke)/2,circ=2*Math.PI*r;
  const arc=svg.getElementById("wheel-arc"), dot=svg.getElementById("wheel-dot");
  if(arc) arc.style.strokeDashoffset=circ*(1-p);
  const angle=p*360-90,rad=(angle*Math.PI)/180;
  const cx=size/2+r*Math.cos(rad),cy=size/2+r*Math.sin(rad);
  if(dot&&p>0.01){dot.setAttribute("cx",cx);dot.setAttribute("cy",cy);dot.style.display="";}
}

      <circle id="wheel-arc" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#wg)" stroke-width="${stroke}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 1s ease"/>
      <circle id="wheel-dot" cx="${cx}" cy="${cy}" r="5" fill="#f0c972" style="filter:drop-shadow(0 0 5px #f0c972);display:${p>0.01?'':'none'}"/>
      <text id="time-text" x="${size/2}" y="${size/2-12}" text-anchor="middle" fill="#f0c972" font-size="24" font-family="'DM Serif Display',serif">${getTime()}</text>

    </svg>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

      <button class="btn-gold" onclick="addTodayGoal()">+</button>
    </div>
    <div>
      ${state.todayGoals.length===0?`<div style="color:var(--faint);font-size:12px;text-align:center;padding:8px 0;font-family:'DM Mono',monospace">No goals yet</div>`:''}

      ${state.tomorrowGoals.map(g=>`

        <span style="flex:1;font-size:13px;font-family:'DM Mono',monospace;color:var(--dim)">${g.text}</span>
        <span onclick="removeTomorrowGoal('${g.id}')" style="color:#2e2845;cursor:pointer;font-size:16px">×</span>
      </div>`).join("")}
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-label" style="margin-bottom:0">Today's Schedule</div>
    ${gcalAccessToken
      ? `<div style="display:flex;gap:6px">
           <button onclick="gcalRefresh()" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 9px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">↻</button>

         </div>`
      : `<button onclick="gcalConnect()" style="background:linear-gradient(135deg,#4285F4,#1a6fd4);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">+ Connect Google Cal</button>`
    }
  </div>
  ${gcalLoading?`<div style="display:flex;align-items:center;gap:10px;padding:20px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px"><div style="width:16px;height:16px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div>Loading…</div>`:''}
  ${gcalError?`<div style="background:#ff444422;border:1px solid #ff444466;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#ff6b6b;font-family:'DM Mono',monospace">${gcalError}</div>`:''}
  ${!gcalLoading && schedItems.length===0 && gcalAccessToken?`<div style="text-align:center;padding:20px;color:var(--faint);font-family:'DM Mono',monospace;font-size:12px">No events today</div>`:''}
  ${!gcalLoading && !gcalAccessToken && state.supplements.length===0?'':`
  <div style="display:flex;flex-direction:column;gap:8px">
    ${schedItems.map(item=>renderScheduleItem(item,'home')).join("")}
  </div>`}
</div>`;
}

window.addTodayGoal = () => { const i=document.getElementById("new-today"); const v=i.value.trim(); if(!v) return; state.todayGoals.push({id:uid2(),text:v,done:false}); i.value=""; saveToFirestore(); };
window.addTomorrowGoal = () => { const i=document.getElementById("new-tomorrow"); const v=i.value.trim(); if(!v) return; state.tomorrowGoals.push({id:uid2(),text:v,done:false}); i.value=""; saveToFirestore(); };
window.toggleGoal = (id) => { const g=state.todayGoals.find(x=>x.id===id); if(g){g.done=!g.done;saveToFirestore();if(currentTab==="home")renderHome();} };
window.removeGoal = (id) => { state.todayGoals=state.todayGoals.filter(x=>x.id!==id); saveToFirestore(); };
window.removeTomorrowGoal = (id) => { state.tomorrowGoals=state.tomorrowGoals.filter(x=>x.id!==id); saveToFirestore(); };

const GCAL_CLIENT_ID="124339449156-61291qfr8vbktbsqj7rk5qq7qq5nsohg.apps.googleusercontent.com";
const GCAL_SCOPE="https://www.googleapis.com/auth/calendar.readonly";
let gcalAccessToken=null, gcalEvents=[], gcalLoading=false, gcalError=null, gcalTokenClient=null, gsiLoaded=false;

function loadGSI(){
  if(gsiLoaded) return; gsiLoaded=true;
  const s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client"; s.async=true; s.defer=true;
  s.onload=()=>{
    gcalTokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GCAL_CLIENT_ID, scope:GCAL_SCOPE,
      callback:async(resp)=>{ if(resp.error){gcalError="Access denied";gcalLoading=false;renderCurrentTab();return;} gcalAccessToken=resp.access_token;gcalError=null;await fetchGCalEvents(); }
    });
  };
  document.head.appendChild(s);
}

async function fetchGCalEvents(){
  gcalLoading=true; gcalError=null; renderCurrentTab();
  try{
    const now=new Date(), s=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString(), e=new Date(now.getFullYear(),now.getMonth(),now.getDate(),23,59,59).toISOString();
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(s)}&timeMax=${encodeURIComponent(e)}&singleEvents=true&orderBy=startTime&maxResults=50`;
    const res=await fetch(url,{headers:{Authorization:`Bearer ${gcalAccessToken}`}});
    if(!res.ok){ if(res.status===401){gcalAccessToken=null;gcalError="Session expired — reconnect";}else{gcalError=`Error ${res.status}`;} gcalLoading=false;renderCurrentTab();return; }
    const data=await res.json();
    gcalEvents=(data.items||[]).sort((a,b)=>(a.start?.dateTime||a.start?.date||"").localeCompare(b.start?.dateTime||b.start?.date||""));
  }catch(e){gcalError="Network error";}
  gcalLoading=false; renderCurrentTab();
}

async function fetchGCalEventsForRange(timeMin, timeMax){
  if(!gcalAccessToken) return [];
  try{
    const url=`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime&maxResults=200`;
    const res=await fetch(url,{headers:{Authorization:`Bearer ${gcalAccessToken}`}});
    if(!res.ok) return [];
    const data=await res.json();
    return data.items||[];
  }catch(e){ return []; }
}

window.gcalConnect=()=>{ if(!gcalTokenClient){gcalError="Still loading, retry in a second";renderCurrentTab();return;} gcalTokenClient.requestAccessToken({prompt:""}); };

function fmtEventTime(ev){ if(ev.start?.dateTime){ const s=new Date(ev.start.dateTime),e=new Date(ev.end.dateTime),fmt=d=>d.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"}); return `${fmt(s)} – ${fmt(e)}`; } return "All day"; }
function isEventNow(ev){ if(!ev.start?.dateTime) return false; const now=Date.now(); return now>=new Date(ev.start.dateTime).getTime()&&now<=new Date(ev.end.dateTime).getTime(); }
function isEventPast(ev){ if(!ev.start?.dateTime) return false; return Date.now()>new Date(ev.end.dateTime).getTime(); }

function buildTodaySchedule(){
  const items=[];
  gcalEvents.forEach(ev=>items.push({type:"event",ev,sortKey:ev.start?.dateTime||ev.start?.date||"0000"}));
  state.todayGoals.forEach(g=>items.push({type:"goal",goal:g,sortKey:"anytime"}));
  const slotTimes={morning:"06:00",afternoon:"12:00",evening:"17:00",night:"21:00"};
  TIME_SLOTS.forEach(slot=>{ const supps=state.supplements.filter(s=>s.times.includes(slot.key)); if(supps.length) items.push({type:"supps",slot,supps,sortKey:`${todayKey()}T${slotTimes[slot.key]}`}); });
  items.sort((a,b)=>{ if(a.sortKey==="anytime"&&b.sortKey!=="anytime") return -1; if(b.sortKey==="anytime"&&a.sortKey!=="anytime") return 1; return a.sortKey.localeCompare(b.sortKey); });
  return items;
}

let calView="week", calOffset=0, calRangeEvents={}, calShowGoals=true, calShowSupps=true, calSelectedDay=null;

function getWeekDays(offset){
  const now=new Date(), dow=now.getDay(), monday=new Date(now);
  monday.setDate(now.getDate()-((dow+6)%7)+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}
function getMonthDays(offset){
  const now=new Date(), y=now.getFullYear(), m=now.getMonth()+offset;
  const first=new Date(y,m,1), last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  const days=[];
  for(let i=0;i<startDow;i++) days.push(null);
  for(let d=1;d<=last.getDate();d++) days.push(new Date(y,m,d));
  while(days.length%7!==0) days.push(null);
  return days;
}
function dateKey(d){ return d.toISOString().slice(0,10); }

async function loadCalRangeEvents(days){
  if(!gcalAccessToken) return;
  const realDays=days.filter(Boolean); if(!realDays.length) return;
  const min=new Date(realDays[0]); min.setHours(0,0,0,0);
  const max=new Date(realDays[realDays.length-1]); max.setHours(23,59,59,999);
  const evts=await fetchGCalEventsForRange(min.toISOString(),max.toISOString());
  calRangeEvents={};
  evts.forEach(ev=>{ const dk=(ev.start?.dateTime||ev.start?.date||"").slice(0,10); if(!calRangeEvents[dk]) calRangeEvents[dk]=[]; calRangeEvents[dk].push(ev); });
  renderCalendar();
}

async function renderCalendar(){
  loadGSI();
  const main=document.getElementById("main-content"); if(!main) return;
  const todayStr=todayKey();
  const days=calView==="week"?getWeekDays(calOffset):getMonthDays(calOffset);
  if(gcalAccessToken && Object.keys(calRangeEvents).length===0) loadCalRangeEvents(days.filter(Boolean));

  let periodLabel="";
  if(calView==="week"){
    const realDays=days.filter(Boolean);
    const s=realDays[0].toLocaleDateString("en-AU",{day:"numeric",month:"short"});
    const e=realDays[6].toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});
    periodLabel=`${s} – ${e}`;
  } else {
    const now=new Date(), ref=new Date(now.getFullYear(),now.getMonth()+calOffset,1);
    periodLabel=ref.toLocaleDateString("en-AU",{month:"long",year:"numeric"});
  }

  main.innerHTML=`
<div style="padding:16px 16px 100px;max-width:440px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text);letter-spacing:.04em;line-height:1">Calendar</div>
    <div style="display:flex;gap:6px;align-items:center">
      ${gcalAccessToken?`<button onclick="reloadCal()" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 9px;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">↻</button>`:`<button onclick="gcalConnect()" style="background:linear-gradient(135deg,#4285F4,#1a6fd4);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">+ Connect</button>`}
    </div>
  </div>
  <div style="display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px">
    <button onclick="setCalView('week')" style="flex:1;background:${calView==='week'?'linear-gradient(135deg,var(--gold),var(--orange))':'none'};border:none;border-radius:8px;padding:7px;color:${calView==='week'?'#0d0b14':'var(--muted)'};font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s">Week</button>
    <button onclick="setCalView('month')" style="flex:1;background:${calView==='month'?'linear-gradient(135deg,var(--gold),var(--orange))':'none'};border:none;border-radius:8px;padding:7px;color:${calView==='month'?'#0d0b14':'var(--muted)'};font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s">Month</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    <button onclick="toggleCalGoals()" style="flex:1;background:${calShowGoals?'#6fcf9733':'var(--card2)'};border:1px solid ${calShowGoals?'var(--green)':'var(--border)'};border-radius:8px;padding:6px 10px;color:${calShowGoals?'var(--green)':'var(--faint)'};font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s">✓ Goals</button>
    <button onclick="toggleCalSupps()" style="flex:1;background:${calShowSupps?'#f0c97222':'var(--card2)'};border:1px solid ${calShowSupps?'var(--gold)':'var(--border)'};border-radius:8px;padding:6px 10px;color:${calShowSupps?'var(--gold)':'var(--faint)'};font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s">💊 Supps</button>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <button onclick="calNav(-1)" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer">‹</button>
    <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text);text-align:center">${periodLabel}</div>
    <button onclick="calNav(1)" style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer">›</button>
  </div>
  ${calOffset!==0?`<div style="text-align:center;margin-bottom:10px"><button onclick="calGoToday()" style="background:none;border:none;color:var(--gold);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-decoration:underline">Back to today</button></div>`:''}
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
    ${['M','T','W','T','F','S','S'].map(d=>`<div style="text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--faint);padding:2px 0">${d}</div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">
    ${days.map(d=>{
      if(!d) return `<div></div>`;
      const dk=dateKey(d), isToday=dk===todayStr, isSelected=dk===calSelectedDay;
      const evts=calRangeEvents[dk]||[];
      const hasGoals=calShowGoals&&dk===todayStr&&state.todayGoals.length>0;
      const hasSupps=calShowSupps&&state.supplements.length>0;
      const isSun=(d.getDay()===0), isSat=(d.getDay()===6);
      return `<div onclick="calSelectDay('${dk}')" style="background:${isSelected?'linear-gradient(135deg,var(--gold),var(--orange))':isToday?'#f0c97222':'var(--card2)'};border:1px solid ${isSelected?'var(--gold)':isToday?'var(--gold)':'var(--border)'};border-radius:8px;padding:6px 4px 5px;text-align:center;cursor:pointer;min-height:52px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s">
        <div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:${isSelected?'#0d0b14':isToday?'var(--gold)':isSun||isSat?'var(--muted)':'var(--text)'}">${d.getDate()}</div>
        <div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:8px">
          ${evts.slice(0,2).map(()=>`<div style="width:5px;height:5px;border-radius:50%;background:var(--purple);flex-shrink:0"></div>`).join("")}
          ${hasGoals?`<div style="width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0"></div>`:''}
          ${hasSupps&&dk===todayStr?`<div style="width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0"></div>`:''}
          ${evts.length>2?`<div style="font-size:7px;color:var(--faint);font-family:'DM Mono',monospace;line-height:5px">+${evts.length-2}</div>`:''}
        </div>
      </div>`;
    }).join("")}
  </div>
  ${calSelectedDay ? renderDayDetail(calSelectedDay) : `<div style="text-align:center;padding:16px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--faint)">Tap a day to see details</div>`}
</div>`;
}

function renderDayDetail(dk){
  const d=new Date(dk+"T12:00:00");
  const label=d.toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
  const evts=calRangeEvents[dk]||[];
  const isToday=dk===todayKey();
  let items=[];
  evts.forEach(ev=>items.push({type:"event",ev,sortKey:ev.start?.dateTime||ev.start?.date||"0000"}));
  if(calShowGoals&&isToday) state.todayGoals.forEach(g=>items.push({type:"goal",goal:g,sortKey:"anytime"}));
  if(calShowSupps&&isToday){
    const slotTimes={morning:"06:00",afternoon:"12:00",evening:"17:00",night:"21:00"};
    TIME_SLOTS.forEach(slot=>{ const supps=state.supplements.filter(s=>s.times.includes(slot.key)); if(supps.length) items.push({type:"supps",slot,supps,sortKey:`${dk}T${slotTimes[slot.key]}`}); });
  }
  items.sort((a,b)=>{ if(a.sortKey==="anytime"&&b.sortKey!=="anytime") return -1; if(b.sortKey==="anytime"&&a.sortKey!=="anytime") return 1; return a.sortKey.localeCompare(b.sortKey); });
  return `
  <div style="border-top:1px solid var(--border);padding-top:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text)">${label}</div>
      <button onclick="calSelectedDay=null;renderCalendar()" style="background:none;border:none;color:var(--faint);font-size:18px;cursor:pointer;line-height:1">×</button>
    </div>
    ${items.length===0?`<div style="text-align:center;padding:16px 0;color:var(--faint);font-family:'DM Mono',monospace;font-size:12px">Nothing scheduled</div>`:''}
    <div style="display:flex;flex-direction:column;gap:7px">
      ${items.map(item=>renderScheduleItem(item,'calendar')).join("")}
    </div>
  </div>`;
}

window.setCalView=(v)=>{ calView=v; calOffset=0; calRangeEvents={}; renderCalendar(); };
window.calNav=(dir)=>{ calOffset+=dir; calRangeEvents={}; renderCalendar(); loadCalRangeEvents(calView==="week"?getWeekDays(calOffset).filter(Boolean):getMonthDays(calOffset).filter(Boolean)); };
window.calGoToday=()=>{ calOffset=0; calRangeEvents={}; renderCalendar(); };
window.calSelectDay=(dk)=>{ calSelectedDay=calSelectedDay===dk?null:dk; renderCalendar(); };
window.toggleCalGoals=()=>{ calShowGoals=!calShowGoals; renderCalendar(); };
window.toggleCalSupps=()=>{ calShowSupps=!calShowSupps; renderCalendar(); };
window.reloadCal=()=>{ calRangeEvents={}; const days=calView==="week"?getWeekDays(calOffset):getMonthDays(calOffset); loadCalRangeEvents(days.filter(Boolean)); };

// AI FITNESS COACH — FLOATING BUTTON + CHAT MODAL (Anthropic API)
// ═══════════════════════════════════════════════════════════════════════════
(function(){
  // ── Styles ──
  const style = document.createElement('style');
  style.innerHTML = `

    #coach-header {
      display: flex;

      flex-shrink: 0;
    }
    #coach-messages {
      flex: 1;

      display: flex;
      flex-direction: column;

    }
    .coach-msg {
      max-width: 90%;
      padding: 9px 12px;
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.55;
    }
    .coach-msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #f0c97233, #e07b3f22);
      border: 1px solid var(--gold);
      color: var(--text);
      border-bottom-right-radius: 4px;
    }
    .coach-msg.ai {
      align-self: flex-start;
      background: var(--card2);
      border: 1px solid var(--border2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .coach-msg.ai.loading { color: var(--faint); font-style: italic; }
    #coach-image-preview {
      padding: 8px 14px 0;
      display: none;
    }
    #coach-image-preview img {
      height: 56px;
      border-radius: 8px;
      border: 1px solid var(--border2);
    }
    #coach-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--border);
      align-items: flex-end;
      flex-shrink: 0;
    }
    #coach-text {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 9px 11px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      resize: none;
      max-height: 80px;
      overflow-y: auto;
    }
    #coach-text::placeholder { color: var(--faint); }
    #coach-img-btn {
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 9px 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }
    #coach-img-btn:hover { border-color: var(--gold); color: var(--gold); }
    #coach-send {
      background: linear-gradient(135deg, var(--gold), var(--orange));
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      color: #0d0b14;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }
    #coach-send:disabled { opacity: 0.4; cursor: default; }
  `;
  document.head.appendChild(style);

  // ── DOM ──
  const fab = document.createElement('button');
  fab.id = 'coach-fab';
  fab.textContent = '🤖';
  fab.title = 'AI Fitness Coach';

  const modal = document.createElement('div');
  modal.id = 'coach-modal';
  modal.innerHTML = `
    <div id="coach-header">
      <div style="font-size:20px">🤖</div>
      <div style="flex:1">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);letter-spacing:.04em">AI Fitness Coach</div>
        <div style="font-size:10px;color:var(--faint);font-family:'DM Mono',monospace">Powered by Claude · Your personal trainer</div>
      </div>
      <button onclick="coachClear()" style="background:none;border:none;color:var(--faint);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;padding:4px 6px">Clear</button>
    </div>
    <div id="coach-messages"></div>
    <div id="coach-image-preview">
      <div style="display:flex;align-items:center;gap:8px">
        <img id="coach-img-thumb" src="" alt=""/>
        <button onclick="coachRemoveImage()" style="background:none;border:none;color:var(--faint);font-size:18px;cursor:pointer">×</button>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--faint)">Image attached</span>
      </div>
    </div>
    <div id="coach-input-row">
      <textarea id="coach-text" placeholder="Ask your coach anything…" rows="1" onkeydown="coachKeydown(event)"></textarea>
      <button id="coach-img-btn" onclick="document.getElementById('coach-file').click()" title="Attach image">📷</button>
      <input id="coach-file" type="file" accept="image/*" style="display:none" onchange="coachImageSelected(this)"/>
      <button id="coach-send" onclick="coachSend()">Send</button>
    </div>
  `;

  document.body.appendChild(fab);
  document.body.appendChild(modal);

  // ── State ──
  let coachOpen = false;
  let coachMessages = []; // {role, content (text or array)}
  let coachImageB64 = null;
  let coachImageMime = null;
  let coachIsLoading = false;

  // ── System prompt ──
  function buildSystemPrompt(){
    const weightUnit = (typeof useLb !== 'undefined' && useLb) ? 'lb' : 'kg';
    const routinesSummary = (typeof state !== 'undefined' && state.routines?.length)
      ? state.routines.map(r=>`${r.name}: ${r.exercises.map(e=>e.name).join(', ')}`).join('\n')
      : 'No routines yet';
    const histSummary = (typeof state !== 'undefined' && state.exerciseHistory)
      ? Object.entries(state.exerciseHistory).slice(0,8).map(([name,sessions])=>{
          const last = sessions[sessions.length-1];
          return last ? `${name}: last ${last.weight}${weightUnit} x ${last.reps} reps (${sessions.length} sessions)` : '';
        }).filter(Boolean).join('\n')
      : 'No history yet';
    const suppsSummary = (typeof state !== 'undefined' && state.supplements?.length)
      ? state.supplements.map(s=>`${s.name}${s.dosage?' '+s.dosage:''} (${s.times.join(', ')})`).join(', ')
      : 'None';
    const weightHistory = (typeof state !== 'undefined' && state.weightLog?.length)
      ? [...state.weightLog].sort((a,b)=>a.date.localeCompare(b.date)).slice(-10)
          .map(e=>`${e.date}: ${e.weight}${weightUnit}`).join(', ')
      : 'No weight data yet';
    const goals = (typeof state !== 'undefined' && state.todayGoals?.length)
      ? state.todayGoals.map(g=>`${g.done?'✓':'-'} ${g.text}`).join(', ')
      : 'None set';

    return `You are a professional fitness coach embedded in a personal life dashboard app. Be concise, practical, and encouraging. Keep responses under 120 words unless the user asks for detail. Use bullet points for lists. Never waffle.

USER CONTEXT:
- Routines: ${routinesSummary}
- Recent exercise history: ${histSummary}
- Supplements: ${suppsSummary}
- Weight log (last 10): ${weightHistory}
- Today's goals: ${goals}
- Weight unit: ${weightUnit}

When analysing progress photos, give honest, actionable feedback on physique, form, or posture. When asked about nutrition or supplementation, give evidence-based advice tailored to their data. Always connect advice back to their actual data where relevant.`;
  }

  // ── Toggle ──
  fab.addEventListener('click', ()=>{
    coachOpen = !coachOpen;
    modal.classList.toggle('visible', coachOpen);
    fab.classList.toggle('open', coachOpen);
    if(coachOpen && coachMessages.length===0) coachGreet();
  });

  function coachGreet(){
    const hour = new Date().getHours();
    const greeting = hour<12?'Morning':'Evening';
    const hasHistory = typeof state !== 'undefined' && Object.keys(state.exerciseHistory||{}).length > 0;
    const msg = hasHistory
      ? `${greeting}! I've reviewed your training data. Ask me about progressive overload, nutrition, recovery, or upload a progress photo for physique feedback.`
      : `${greeting}! I'm your AI fitness coach. Once you log some workouts I can analyse your progress. For now, ask me anything about training or nutrition.`;
    appendMessage('ai', msg);
  }

  function appendMessage(role, text){
    coachMessages.push({role, text});
    renderMessages();
  }

  function renderMessages(){
    const container = document.getElementById('coach-messages');
    if(!container) return;
    container.innerHTML = coachMessages.map(m=>`
      <div class="coach-msg ${m.role==='user'?'user':'ai'}${m.loading?' loading':''}">
        ${m.text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/^• /gm,'• ')}
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  window.coachSend = async function(){
    if(coachIsLoading) return;
    const textEl = document.getElementById('coach-text');
    const text = textEl?.value.trim();
    if(!text && !coachImageB64) return;

    appendMessage('user', text || '📷 [Image attached]');
    textEl.value = '';

    const currentImgB64 = coachImageB64;
    const currentImgMime = coachImageMime;
    coachRemoveImage();

    const loadingMsg = {role:'ai', text:'Thinking…', loading:true};
    coachMessages.push(loadingMsg);
    renderMessages();
    coachIsLoading = true;
    document.getElementById('coach-send').disabled = true;

    // Build the history array for the SDK
    const geminiHistory = coachMessages.slice(0,-1)
      .filter(m=>!m.loading)
      .slice(-20)
      .map(m=>({
        role: m.role === 'user' ? 'user' : 'model',
        parts: [{ text: m.apiContent || m.text }]
      }));

    let currentParts = [];
    if(currentImgB64){
      // The Firebase SDK requires raw base64 data without the data URI prefix
      const base64Data = currentImgB64.includes(',') ? currentImgB64.split(',')[1] : currentImgB64;
      currentParts.push({
        inlineData: {
          mimeType: currentImgMime,
          data: base64Data
        }
      });
      currentParts.push({ text: text || 'Please analyse this image.' });
    } else {
      currentParts.push({ text: text });
    }

    geminiHistory.push({ role:'user', parts: currentParts });

    try {
      // Initialize the model using the free Firebase AI Logic instance
      const coachModel = getGenerativeModel(ai, { 
        model: "gemini-1.5-flash", 
        systemInstruction: buildSystemPrompt()
      });

      // Send the request via the Firebase SDK
      const response = await coachModel.generateContent({ contents: geminiHistory });
      const reply = response.response.text();
      
      coachMessages.pop();
      coachMessages.push({role:'ai', text:reply, apiContent:reply});
      renderMessages();

    } catch(err) {
      console.error(err);
      coachMessages.pop();
      coachMessages.push({role:'ai', text:'Connection error. Please check your network and try again.'});
      renderMessages();
    }

    coachIsLoading = false;
    const sendBtn = document.getElementById('coach-send');
    if(sendBtn) sendBtn.disabled = false;
  };

  window.coachKeydown = function(e){
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); coachSend(); }
  };

  window.coachImageSelected = function(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const result = ev.target.result;
      coachImageB64 = result.split(',')[1];
      coachImageMime = file.type;
      const preview = document.getElementById('coach-image-preview');
      const thumb = document.getElementById('coach-img-thumb');
      if(preview && thumb){ thumb.src=result; preview.style.display='block'; }
    };
    reader.readAsDataURL(file);
    input.value='';
  };

  window.coachRemoveImage = function(){
    coachImageB64 = null; coachImageMime = null;
    const preview = document.getElementById('coach-image-preview');
    if(preview) preview.style.display='none';
  };

  window.coachClear = function(){
    coachMessages = [];
    renderMessages();
    coachGreet();
  };

})();

  .card { background:var(--card); border:1px solid var(--border2); border-radius:14px; padding:18px 18px 16px; }
  .section-label { font-size:11px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; font-family:'DM Mono',monospace; margin-bottom:12px; }
  .inp { background:var(--card2); border:1px solid var(--border2); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; }
  .inp::placeholder { color:var(--faint); }
  .btn-gold   { background:linear-gradient(135deg,var(--gold),var(--orange)); border:none; border-radius:8px; padding:9px 16px; color:#0d0b14; font-weight:700; font-family:'DM Mono',monospace; font-size:14px; cursor:pointer; }
  .btn-purple { background:linear-gradient(135deg,var(--purple),#5a4a8a); border:none; border-radius:8px; padding:9px 16px; color:#0d0b14; font-weight:700; font-family:'DM Mono',monospace; font-size:14px; cursor:pointer; }
  .btn-ghost  { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:var(--muted); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; }
  .goal-row { display:flex; align-items:center; gap:10px; background:#1e1a30; border-radius:10px; padding:9px 12px; border:1px solid var(--border); transition:border .3s; }
  .goal-row.done { border-color:#6fcf9733; }
  .checkbox { width:17px; height:17px; border-radius:4px; border:2px solid var(--faint); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .2s; font-size:10px; font-weight:900; color:#17132a; }
  .checkbox.checked { border-color:var(--green); background:var(--green); }
  #tab-bar { position:fixed; bottom:0; left:0; right:0; background:#0d0b14ee; border-top:1px solid var(--border); display:flex; backdrop-filter:blur(12px); z-index:50; }
  .tab-btn { flex:1; background:none; border:none; border-top:2px solid transparent; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0; cursor:pointer; color:var(--faint); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; transition:all .2s; }
  .tab-btn.active { color:var(--gold); border-top-color:var(--gold); }
  .tab-btn span { font-size:18px; }
  #auth-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:200; }
  #user-bar { display:flex; align-items:center; justify-content:flex-end; gap:10px; padding:12px 16px 0; max-width:440px; margin:0 auto; }
  #user-avatar { width:28px; height:28px; border-radius:99px; background:linear-gradient(135deg,var(--gold),var(--orange)); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:14px; color:#0d0b14; }
  #user-name { font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); }
  #signout-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:4px 10px; color:var(--faint); font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; }
  ::-webkit-scrollbar { display:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes spin   { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="auth-screen" style="display:flex">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);letter-spacing:.05em;line-height:1">Life<br>Dashboard</div>
  <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--dim);text-align:center;max-width:260px">Sign in to sync your goals and fitness data across all your devices</div>
  <button onclick="signInGoogle()" style="display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:14px 24px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;margin-top:8px">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
</div>

<div id="app" style="display:none">
  <div id="user-bar">
    <div id="user-avatar">?</div>
    <div id="user-name"></div>
    <button id="signout-btn" onclick="signOutUser()">Sign out</button>
  </div>
  <div id="main-content"></div>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="home"     onclick="switchTab('home')">    <span>🏠</span>Home</button>
    <button class="tab-btn"        data-tab="fitness"  onclick="switchTab('fitness')"> <span>🏋️</span>Fitness</button>
    <button class="tab-btn"        data-tab="health"   onclick="switchTab('health')">  <span>💊</span>Health</button>
    <button class="tab-btn"        data-tab="calendar" onclick="switchTab('calendar')"><span>📅</span>Calendar</button>
  </div>
</div>

</body>
</html>
