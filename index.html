<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, GoogleAuthProvider, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD7N3IMhCShtARUDJ3ClP8TniRbDu71TCk",
  authDomain: "life-dashboard-3d309.firebaseapp.com",
  projectId: "life-dashboard-3d309",
  appId: "1:920483424217:web:99867c36c968814dbadbc8"
};

const app   = initializeApp(firebaseConfig);
const auth  = getAuth(app);
const db    = getFirestore(app);
const provider = new GoogleAuthProvider();

// ─── STATE ───────────────────────────────────────────────────────────────────
let uid = null;
let unsubscribe = null;
let useLb = false;
let activeWorkout = null; // { routine, sets, startTime, currentEx }
let workoutTimer = null;
let chartInstances = {};

let state = {
  todayGoals: [], tomorrowGoals: [], lastDate: null,
  routines: [], exerciseHistory: {}
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
const HOUR_START = 6, HOUR_END = 24, KG_TO_LB = 2.20462;
const uid2 = () => Math.random().toString(36).slice(2,9);
const fmtWeight = (kg, lb) => lb ? `${(kg*KG_TO_LB).toFixed(1)} lb` : `${kg} kg`;
const getTime = () => new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
const getDate = () => new Date().toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long"});
const getGreeting = () => { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; };
const getDayPct = () => { const h=new Date().getHours()+new Date().getMinutes()/60; return Math.min(1,Math.max(0,(h-HOUR_START)/(HOUR_END-HOUR_START))); };
const fmtTimer = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

// ─── FIRESTORE SYNC ──────────────────────────────────────────────────────────
async function saveToFirestore() {
  if (!uid) return;
  try {
    await setDoc(doc(db,"users",uid), {
      todayGoals: state.todayGoals,
      tomorrowGoals: state.tomorrowGoals,
      lastDate: state.lastDate,
      routines: state.routines,
      exerciseHistory: state.exerciseHistory,
      useLb
    });
  } catch(e) { console.error("Save error",e); }
}

function subscribeToFirestore() {
  if (unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(doc(db,"users",uid), (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      const today = new Date().toDateString();
      // Day rollover
      if (d.lastDate && d.lastDate !== today && d.tomorrowGoals?.length) {
        state.todayGoals = [...(d.todayGoals||[]).filter(g=>!g.done), ...(d.tomorrowGoals||[]).map(g=>({...g,done:false}))];
        state.tomorrowGoals = [];
        state.lastDate = today;
        saveToFirestore();
      } else {
        state.todayGoals    = d.todayGoals    || [];
        state.tomorrowGoals = d.tomorrowGoals || [];
        state.lastDate      = d.lastDate      || today;
      }
      state.routines         = d.routines         || [];
      state.exerciseHistory  = d.exerciseHistory  || {};
      useLb = d.useLb || false;
    } else {
      state.lastDate = new Date().toDateString();
      saveToFirestore();
    }
    renderCurrentTab();
  });
}

// ─── AUTH ────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    uid = user.uid;
    subscribeToFirestore();
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-avatar").textContent = user.displayName?.charAt(0).toUpperCase() || "?";
    document.getElementById("user-name").textContent = user.displayName || "User";
  } else {
    uid = null;
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

window.signInGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { console.error(e); }
};
window.signOutUser = async () => {
  try { await signOut(auth); }
  catch(e) { console.error(e); }
};

// ─── TAB NAV ─────────────────────────────────────────────────────────────────
let currentTab = "daily";
window.switchTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  renderCurrentTab();
};
function renderCurrentTab() {
  if (currentTab === "daily") renderDaily();
  else renderFitness();
}

// ─── CLOCK TICK ──────────────────────────────────────────────────────────────
setInterval(() => {
  if (currentTab === "daily") {
    const tw = document.getElementById("time-text");
    const tp = document.getElementById("time-pct");
    if (tw) { tw.textContent = getTime(); const p=getDayPct(); tp.textContent=`${Math.round(p*100)}% of day`; updateWheel(p); }
  }
  if (activeWorkout) {
    const el = document.getElementById("workout-timer");
    if (el) el.textContent = "⏱ " + fmtTimer(Math.floor((Date.now()-activeWorkout.startTime)/1000));
  }
}, 10000);

// ═══════════════════════════════════════════════════════════════════════════
// DAILY PAGE
// ═══════════════════════════════════════════════════════════════════════════
function updateWheel(p) {
  const svg = document.getElementById("wheel-svg");
  if (!svg) return;
  const size=200,stroke=12,r=(size-stroke)/2,circ=2*Math.PI*r;
  const arc = svg.getElementById("wheel-arc");
  const dot = svg.getElementById("wheel-dot");
  const offset = circ*(1-p);
  if (arc) arc.style.strokeDashoffset = offset;
  const angle = p*360-90, rad=(angle*Math.PI)/180;
  const cx=size/2+r*Math.cos(rad), cy=size/2+r*Math.sin(rad);
  if (dot && p>0.01) { dot.setAttribute("cx",cx); dot.setAttribute("cy",cy); dot.style.display=""; }
}

function renderDaily() {
  const p = getDayPct();
  const size=200,stroke=12,r=(size-stroke)/2,circ=2*Math.PI*r;
  const offset=circ*(1-p);
  const angle=p*360-90,rad=(angle*Math.PI)/180;
  const cx=size/2+r*Math.cos(rad),cy=size/2+r*Math.sin(rad);
  const done = state.todayGoals.filter(g=>g.done).length;
  const total = state.todayGoals.length;
  const pct = total===0?0:Math.round((done/total)*100);

  const main = document.getElementById("main-content");
  main.innerHTML = `
<div style="padding:28px 16px 100px;max-width:440px;margin:0 auto">
  <div style="text-align:center;margin-bottom:22px">
    <div style="font-size:11px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px">${getDate()}</div>
    <div style="font-size:26px;font-family:'DM Serif Display',serif;color:var(--text)">${getGreeting()}</div>
  </div>
  <div style="display:flex;justify-content:center;margin-bottom:26px">
    <svg id="wheel-svg" width="${size}" height="${size}" style="filter:drop-shadow(0 0 16px #f0c97233)">
      <defs>
        <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#f0c972"/><stop offset="100%" stop-color="#e07b3f"/>
        </linearGradient>
      </defs>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1e1e2e" stroke-width="${stroke}"/>
      <circle id="wheel-arc" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#wg)" stroke-width="${stroke}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 1s ease"/>
      <circle id="wheel-dot" cx="${cx}" cy="${cy}" r="5" fill="#f0c972" style="filter:drop-shadow(0 0 5px #f0c972);display:${p>0.01?'':'none'}"/>
      <text id="time-text" x="${size/2}" y="${size/2-12}" text-anchor="middle" fill="#f0c972" font-size="24" font-family="'DM Serif Display',serif">${getTime()}</text>
      <text id="time-pct" x="${size/2}" y="${size/2+12}" text-anchor="middle" fill="#9991b8" font-size="12" font-family="'DM Mono',monospace">${Math.round(p*100)}% of day</text>
      <text x="${size/2}" y="${size/2+30}" text-anchor="middle" fill="#6b6485" font-size="10" font-family="'DM Mono',monospace">${HOUR_START}:00 → ${HOUR_END}:00</text>
    </svg>
  </div>

  <!-- Today -->
  <div class="card" style="margin-bottom:12px">
    <div class="section-label">Today's Goals</div>
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;font-family:'DM Mono',monospace;color:var(--dim);letter-spacing:.08em">
        <span>GOALS COMPLETE</span>
        <span style="color:${pct===100?'var(--green)':'var(--gold)'}">${done}/${total} — ${pct}%</span>
      </div>
      <div style="height:6px;background:#1e1e2e;border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct===100?'linear-gradient(90deg,#6fcf97,#43b580)':'linear-gradient(90deg,#f0c972,#e07b3f)'};border-radius:99px;transition:width .5s ease;box-shadow:${pct===100?'0 0 8px #6fcf9799':'0 0 8px #f0c97266'}"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="new-today" class="inp" placeholder="Add a goal..." onkeydown="if(event.key==='Enter')addTodayGoal()" style="flex:1"/>
      <button class="btn-gold" onclick="addTodayGoal()">+</button>
    </div>
    <div id="today-list">
      ${state.todayGoals.length===0?`<div style="color:var(--faint);font-size:12px;text-align:center;padding:10px 0;font-family:'DM Mono',monospace">No goals yet</div>`:''}
      ${state.todayGoals.map(g=>`
      <div class="goal-row${g.done?' done':''}" style="margin-bottom:7px">
        <div class="checkbox${g.done?' checked':''}" onclick="toggleGoal('${g.id}')">${g.done?'✓':''}</div>
        <span style="flex:1;font-size:13px;font-family:'DM Mono',monospace;color:${g.done?'var(--faint)':'var(--text)'};text-decoration:${g.done?'line-through':'none'};transition:all .2s">${g.text}</span>
        <span onclick="removeGoal('${g.id}')" style="color:var(--faint);cursor:pointer;font-size:16px;line-height:1">×</span>
      </div>`).join("")}
    </div>
  </div>

  <!-- Tomorrow -->
  <div class="card" style="background:var(--card-darker);border-color:var(--border)">
    <div class="section-label" style="color:var(--faint)">Tomorrow's Goals</div>
    <div style="font-size:11px;color:#2e2845;margin-bottom:10px;font-family:'DM Mono',monospace">Auto-rolls into today at midnight</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="new-tomorrow" class="inp" placeholder="Plan ahead..." onkeydown="if(event.key==='Enter')addTomorrowGoal()" style="flex:1;background:#17132a;border-color:var(--border)"/>
      <button class="btn-purple" onclick="addTomorrowGoal()">+</button>
    </div>
    <div id="tomorrow-list">
      ${state.tomorrowGoals.length===0?`<div style="color:#2e2845;font-size:12px;text-align:center;padding:10px 0;font-family:'DM Mono',monospace">Nothing queued</div>`:''}
      ${state.tomorrowGoals.map(g=>`
      <div class="goal-row" style="margin-bottom:7px;background:#17132a;border-color:var(--border)">
        <div style="width:17px;height:17px;border-radius:4px;border:2px solid #2e2845;flex-shrink:0"></div>
        <span style="flex:1;font-size:13px;font-family:'DM Mono',monospace;color:var(--dim)">${g.text}</span>
        <span onclick="removeTomorrowGoal('${g.id}')" style="color:#2e2845;cursor:pointer;font-size:16px">×</span>
      </div>`).join("")}
    </div>
  </div>
</div>`;
}

window.addTodayGoal = () => {
  const inp = document.getElementById("new-today");
  const v = inp.value.trim(); if (!v) return;
  state.todayGoals.push({id:uid2(),text:v,done:false});
  inp.value=""; saveToFirestore();
};
window.addTomorrowGoal = () => {
  const inp = document.getElementById("new-tomorrow");
  const v = inp.value.trim(); if (!v) return;
  state.tomorrowGoals.push({id:uid2(),text:v,done:false});
  inp.value=""; saveToFirestore();
};
window.toggleGoal = (id) => {
  const g = state.todayGoals.find(x=>x.id===id);
  if (g) { g.done=!g.done; saveToFirestore(); }
};
window.removeGoal = (id) => { state.todayGoals=state.todayGoals.filter(x=>x.id!==id); saveToFirestore(); };
window.removeTomorrowGoal = (id) => { state.tomorrowGoals=state.tomorrowGoals.filter(x=>x.id!==id); saveToFirestore(); };

// ═══════════════════════════════════════════════════════════════════════════
// FITNESS PAGE
// ═══════════════════════════════════════════════════════════════════════════
function renderFitness() {
  if (activeWorkout) { renderWorkoutSession(); return; }
  const allExercises = [...new Set(state.routines.flatMap(r=>r.exercises.map(e=>e.name)))];
  const main = document.getElementById("main-content");
  main.innerHTML = `
<div style="padding:24px 16px 100px;max-width:440px;margin:0 auto">
  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px">
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--text);letter-spacing:.04em;line-height:1">Fitness</div>
      <div style="font-size:12px;color:var(--dim);font-family:'DM Mono',monospace">Track. Lift. Progress.</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:8px 12px">
      <span onclick="setLb(false)" style="font-size:11px;font-family:'DM Mono',monospace;color:${!useLb?'var(--gold)':'var(--dim)'};cursor:pointer">KG</span>
      <div onclick="toggleLb()" style="width:32px;height:18px;background:${useLb?'var(--gold)':'#2a2440'};border-radius:99px;position:relative;cursor:pointer;transition:background .2s">
        <div style="position:absolute;top:2px;left:${useLb?'14px':'2px'};width:14px;height:14px;border-radius:99px;background:${useLb?'#0d0b14':'var(--muted)'};transition:left .2s"></div>
      </div>
      <span onclick="setLb(true)" style="font-size:11px;font-family:'DM Mono',monospace;color:${useLb?'var(--gold)':'var(--dim)'};cursor:pointer">LB</span>
    </div>
  </div>

  <!-- Routines header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="section-label">Your Routines</div>
    <button class="btn-gold" onclick="openRoutineEditor(null)" style="font-size:14px;padding:6px 14px">+ New</button>
  </div>

  ${state.routines.length===0?`
  <div class="card" style="border-style:dashed;text-align:center;padding:28px 20px;margin-bottom:20px">
    <div style="font-size:28px;margin-bottom:8px">🏋️</div>
    <div style="color:var(--faint);font-family:'DM Mono',monospace;font-size:13px">No routines yet — create your first one</div>
  </div>`:''}

  <div id="routines-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px">
  ${state.routines.map(r=>`
    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px;padding:14px 16px">
        <div style="flex:1">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:.04em">${r.name}</div>
          <div style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace">${r.exercises.length} exercise${r.exercises.length!==1?'s':''}</div>
        </div>
        <button onclick="openRoutineEditor('${r.id}')" class="btn-ghost" style="font-size:11px;padding:6px 10px">Edit</button>
        <span onclick="deleteRoutine('${r.id}')" style="color:var(--faint);cursor:pointer;font-size:18px;line-height:1">×</span>
      </div>
      <div style="padding:0 16px 12px;display:flex;gap:6px;flex-wrap:wrap">
        ${r.exercises.map(e=>`<span style="background:#1e1a30;border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${e.name}</span>`).join("")}
      </div>
      <button onclick="startWorkout('${r.id}')" style="width:100%;background:linear-gradient(90deg,#f0c97222,#e07b3f22);border:none;border-top:1px solid var(--border);padding:12px;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;cursor:pointer">

      </button>

  </div>

  <!-- Progress -->
  ${allExercises.length>0?`

  <div id="progress-list" style="display:flex;flex-direction:column;gap:10px">
    ${allExercises.map(name=>{
      const hist = state.exerciseHistory[name]||[];
      const best = hist.length>0?Math.max(...hist.map(h=>h.weight)):null;
      return `
      <div class="card" style="overflow:hidden">

          <div>

              ${best!==null?`<span style="color:var(--gold);margin-left:8px">Best: ${fmtWeight(best,useLb)}</span>`:''}
            </div>

          <span class="toggle-arrow" style="color:var(--faint);font-size:14px;font-family:'DM Mono',monospace">▼</span>

<!-- Routine Editor Modal -->
<div id="routine-modal" style="display:none;position:fixed;inset:0;background:#0d0b14cc;z-index:100;align-items:flex-end;justify-content:center">
  <div style="background:var(--bg);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-sizing:border-box">
    <div id="modal-title" style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:.05em;margin-bottom:16px">New Routine</div>
    <input id="routine-name" class="inp" placeholder="Routine name (e.g. Push Day)" style="width:100%;box-sizing:border-box;margin-bottom:14px"/>
    <div class="section-label" style="margin-bottom:10px">Exercises</div>
    <div id="exercise-list" style="margin-bottom:10px"></div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <input id="new-exercise" class="inp" placeholder="Add exercise..." onkeydown="if(event.key==='Enter')addExerciseToModal()" style="flex:1"/>
      <button class="btn-gold" onclick="addExerciseToModal()">+</button>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="closeRoutineEditor()" class="btn-ghost" style="flex:1;padding:12px">Cancel</button>
      <button onclick="saveRoutine()" style="flex:1;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;border-radius:12px;padding:12px;color:#0d0b14;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;cursor:pointer">Save</button>
    </div>
  </div>
</div>`;

  // Render charts for expanded panels (none open by default, charts rendered on open)
}

// Routine Editor
let modalExercises = [];
let editingRoutineId = null;

window.openRoutineEditor = (id) => {
  editingRoutineId = id;
  const r = id ? state.routines.find(x=>x.id===id) : null;
  document.getElementById("modal-title").textContent = r ? "Edit Routine" : "New Routine";
  document.getElementById("routine-name").value = r ? r.name : "";
  modalExercises = r ? r.exercises.map(e=>({...e})) : [];
  renderModalExercises();
  document.getElementById("routine-modal").style.display = "flex";
};
window.closeRoutineEditor = () => { document.getElementById("routine-modal").style.display = "none"; };

function renderModalExercises() {
  document.getElementById("exercise-list").innerHTML = modalExercises.map((ex,i)=>`
    <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text)">${ex.name}</span>
        <span onclick="removeModalExercise(${i})" style="color:var(--faint);cursor:pointer;font-size:16px">×</span>
      </div>
      <input class="inp" placeholder="Notes (e.g. 4×8, tempo 3-1-3)" value="${ex.notes||''}"
        oninput="modalExercises[${i}].notes=this.value"
        style="width:100%;box-sizing:border-box;font-size:12px;padding:6px 10px"/>
    </div>`).join("");
}
window.addExerciseToModal = () => {
  const inp = document.getElementById("new-exercise");
  const v = inp.value.trim(); if (!v) return;
  modalExercises.push({id:uid2(),name:v,notes:""});
  inp.value=""; renderModalExercises();
};
window.removeModalExercise = (i) => { modalExercises.splice(i,1); renderModalExercises(); };
window.saveRoutine = () => {
  const name = document.getElementById("routine-name").value.trim();
  if (!name || modalExercises.length===0) return;
  if (editingRoutineId) {
    state.routines = state.routines.map(r=>r.id===editingRoutineId?{...r,name,exercises:modalExercises}:r);
  } else {
    state.routines.push({id:uid2(),name,exercises:modalExercises});
  }
  saveToFirestore();
  closeRoutineEditor();
};
window.deleteRoutine = (id) => { state.routines=state.routines.filter(r=>r.id!==id); saveToFirestore(); };

// Graph toggle
window.toggleExGraph = (name, headerEl) => {
  const panel = headerEl.closest(".card").querySelector(".graph-panel");
  const arrow = headerEl.querySelector(".toggle-arrow");
  const isOpen = panel.style.display !== "none";
  panel.style.display = isOpen ? "none" : "block";
  if (arrow) arrow.textContent = isOpen ? "▼" : "▲";
  if (!isOpen) {
    const canvasId = "chart-" + name.replace(/\s+/g,"_");
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const hist = state.exerciseHistory[name] || [];
    if (hist.length < 2) return;
    if (chartInstances[canvasId]) { chartInstances[canvasId].destroy(); }
    const data = hist.map((h,i)=>({ x: i+1, y: useLb ? parseFloat((h.weight*KG_TO_LB).toFixed(1)) : h.weight }));
    chartInstances[canvasId] = new Chart(canvas, {
      type:"line",
      data:{ datasets:[{ data, borderColor:"#f0c972", backgroundColor:"#f0c97222", borderWidth:2, pointBackgroundColor:"#f0c972", pointRadius:4, tension:0.3 }] },
      options:{ responsive:true, plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx=>`${ctx.parsed.y} ${useLb?'lb':'kg'}` } } },
        scales:{
          x:{ ticks:{color:"#6b6485",font:{family:"'DM Mono',monospace",size:10}}, grid:{color:"#1e1a30"}, title:{display:true,text:"Session",color:"#6b6485",font:{family:"'DM Mono',monospace",size:10}} },
          y:{ ticks:{color:"#6b6485",font:{family:"'DM Mono',monospace",size:10}}, grid:{color:"#1e1a30"}, title:{display:true,text:useLb?'lb':'kg',color:"#6b6485",font:{family:"'DM Mono',monospace",size:10}} }
        }
      }
    });
  }
};

// LB toggle
window.toggleLb = () => { useLb=!useLb; saveToFirestore(); renderFitness(); };
window.setLb = (v) => { useLb=v; saveToFirestore(); renderFitness(); };

// ═══════════════════════════════════════════════════════════════════════════
// WORKOUT SESSION
// ═══════════════════════════════════════════════════════════════════════════
window.startWorkout = (routineId) => {
  const r = state.routines.find(x=>x.id===routineId);
  if (!r) return;
  activeWorkout = {
    routine: r,
    sets: r.exercises.map(()=>[{weight:"",reps:""}]),
    startTime: Date.now(),
    currentEx: 0
  };
  if (workoutTimer) clearInterval(workoutTimer);
  workoutTimer = setInterval(() => {
    const el = document.getElementById("workout-timer");
    if (el) el.textContent = "⏱ " + fmtTimer(Math.floor((Date.now()-activeWorkout.startTime)/1000));
  }, 1000);
  renderWorkoutSession();
};

function renderWorkoutSession() {
  const {routine, sets, currentEx} = activeWorkout;
  const ex = routine.exercises[currentEx];
  const exSets = sets[currentEx];
  const elapsed = Math.floor((Date.now()-activeWorkout.startTime)/1000);

  const main = document.getElementById("main-content");
  main.innerHTML = `
<div style="padding:20px 16px 100px;max-width:440px;margin:0 auto">
  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:.05em">${routine.name}</div>
      <div id="workout-timer" style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace">⏱ ${fmtTimer(elapsed)}</div>
    </div>
    <button onclick="finishWorkout()" style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--green);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer">Finish ✓</button>
  </div>

  <!-- Exercise pills -->
  <div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px;scrollbar-width:none">
    ${routine.exercises.map((e,i)=>`
    <button onclick="switchExercise(${i})" style="flex-shrink:0;background:${i===currentEx?'linear-gradient(135deg,var(--gold),var(--orange))':'var(--card)'};border:1px solid ${i===currentEx?'var(--gold)':'var(--border)'};border-radius:20px;padding:6px 14px;color:${i===currentEx?'#0d0b14':'var(--muted)'};font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap">
      ${e.name}
    </button>`).join("")}
  </div>

  <!-- Exercise card -->
  <div class="card" style="margin-bottom:14px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);letter-spacing:.04em;margin-bottom:${ex.notes?'4px':'14px'}">${ex.name}</div>
    ${ex.notes?`<div style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;margin-bottom:14px">${ex.notes}</div>`:''}

    <!-- Set grid header -->
    <div style="display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:6px;margin-bottom:8px;align-items:center">
      <div style="font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;text-align:center">SET</div>
      <div style="font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;text-align:center">WEIGHT (${useLb?'lb':'kg'})</div>
      <div style="font-size:10px;color:var(--faint);font-family:'DM Mono',monospace;text-align:center">REPS</div>
      <div></div>
    </div>

    <!-- Sets -->
    <div id="sets-container">
      ${exSets.map((s,si)=>`
      <div style="display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:6px;margin-bottom:6px;align-items:center">
        <div style="text-align:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--dim)">${si+1}</div>
        <input type="number" value="${s.weight}" placeholder="0"
          oninput="updateSet(${currentEx},${si},'weight',this.value)"
          style="background:#1e1a30;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;text-align:center;outline:none;width:100%;box-sizing:border-box"/>
        <input type="number" value="${s.reps}" placeholder="0"
          oninput="updateSet(${currentEx},${si},'reps',this.value)"
          style="background:#1e1a30;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;text-align:center;outline:none;width:100%;box-sizing:border-box"/>
        <button onclick="removeSet(${currentEx},${si})" style="background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;font-family:'DM Mono',monospace;padding:0">×</button>
      </div>`).join("")}
    </div>

    <button onclick="addSet(${currentEx})" style="background:var(--card2);border:1px dashed var(--border);border-radius:8px;padding:7px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;width:100%;margin-top:4px">
      + Add Set
    </button>
  </div>

  <!-- Nav -->
  <div style="display:flex;gap:8px">
    ${currentEx>0?`<button onclick="switchExercise(${currentEx-1})" class="btn-ghost" style="flex:1;padding:12px">← Prev</button>`:''}
    ${currentEx<routine.exercises.length-1
      ?`<button onclick="switchExercise(${currentEx+1})" style="flex:1;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;border-radius:12px;padding:12px;color:#0d0b14;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;cursor:pointer">Next →</button>`
      :`<button onclick="finishWorkout()" style="flex:1;background:linear-gradient(135deg,var(--green),#43b580);border:none;border-radius:12px;padding:12px;color:#0d0b14;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;cursor:pointer">Finish ✓</button>`}
  </div>
</div>`;
}

window.switchExercise = (i) => { activeWorkout.currentEx=i; renderWorkoutSession(); };
window.updateSet = (exIdx, setIdx, field, val) => { activeWorkout.sets[exIdx][setIdx][field]=val; };
window.addSet = (exIdx) => { activeWorkout.sets[exIdx].push({weight:"",reps:""}); renderWorkoutSession(); };
window.removeSet = (exIdx, setIdx) => {
  if (activeWorkout.sets[exIdx].length>1) {
    activeWorkout.sets[exIdx].splice(setIdx,1); renderWorkoutSession();
  }
};

window.finishWorkout = () => {
  const {routine, sets} = activeWorkout;
  const dateStr = new Date().toLocaleDateString("en-AU",{day:"numeric",month:"short"});
  routine.exercises.forEach((ex,i) => {
    const valid = sets[i].filter(s=>s.weight!==""&&s.reps!=="");
    if (!valid.length) return;
    const top = Math.max(...valid.map(s=>parseFloat(s.weight)||0));
    if (!state.exerciseHistory[ex.name]) state.exerciseHistory[ex.name]=[];
    state.exerciseHistory[ex.name].push({weight:top,reps:valid[0].reps,date:dateStr});
  });
  clearInterval(workoutTimer);
  const elapsed = Math.floor((Date.now()-activeWorkout.startTime)/1000);
  activeWorkout = null;
  saveToFirestore();

  // Completion screen
  const main = document.getElementById("main-content");
  main.innerHTML = `
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px;padding:32px">
  <div style="font-size:60px">🏆</div>
  <div style="font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:.05em">Workout Complete</div>
  <div style="color:var(--muted);font-family:'DM Mono',monospace;font-size:14px">Duration: ${fmtTimer(elapsed)}</div>
  <button onclick="renderFitness()" style="margin-top:16px;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;border-radius:12px;padding:14px 32px;color:#0d0b14;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.05em;cursor:pointer">
    Back to Routines
  </button>
</div>`;
};

// expose renderFitness globally for finish button
window.renderFitness = renderFitness;
</script>

<style>
  :root {
    --bg:#0d0b14; --card:#13111f; --card2:#17142a; --card-darker:#111020;
    --border:#221d35; --border2:#2a2440;
    --gold:#f0c972; --orange:#e07b3f; --green:#6fcf97; --purple:#9180c4;
    --text:#e8e3f8; --muted:#9991b8; --dim:#6b6485; --faint:#3d3657;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  .card { background:var(--card); border:1px solid var(--border2); border-radius:14px; padding:18px 18px 16px; }
  .section-label { font-size:11px; letter-spacing:.12em; color:var(--dim); text-transform:uppercase; font-family:'DM Mono',monospace; margin-bottom:12px; }
  .inp { background:var(--card2); border:1px solid var(--border2); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; }
  .inp::placeholder { color:var(--faint); }
  .btn-gold { background:linear-gradient(135deg,var(--gold),var(--orange)); border:none; border-radius:8px; padding:9px 16px; color:#0d0b14; font-weight:700; font-family:'DM Mono',monospace; font-size:14px; cursor:pointer; }
  .btn-purple { background:linear-gradient(135deg,var(--purple),#5a4a8a); border:none; border-radius:8px; padding:9px 16px; color:#0d0b14; font-weight:700; font-family:'DM Mono',monospace; font-size:14px; cursor:pointer; }
  .btn-ghost { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:var(--muted); font-family:'DM Mono',monospace; font-size:13px; cursor:pointer; }
  .goal-row { display:flex; align-items:center; gap:10px; background:#1e1a30; border-radius:10px; padding:9px 12px; border:1px solid var(--border); transition:border .3s; }
  .goal-row.done { border-color:#6fcf9733; }
  .checkbox { width:17px; height:17px; border-radius:4px; border:2px solid var(--faint); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .2s; font-size:10px; font-weight:900; color:#17132a; }
  .checkbox.checked { border-color:var(--green); background:var(--green); }

  /* Tab bar */
  #tab-bar { position:fixed; bottom:0; left:0; right:0; background:#0d0b14ee; border-top:1px solid var(--border); display:flex; backdrop-filter:blur(12px); z-index:50; }
  .tab-btn { flex:1; background:none; border:none; border-top:2px solid transparent; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0; cursor:pointer; color:var(--faint); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; transition:all .2s; }
  .tab-btn.active { color:var(--gold); border-top-color:var(--gold); }
  .tab-btn span { font-size:20px; }

  /* Auth screen */
  #auth-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:200; }

  /* User bar */
  #user-bar { display:flex; align-items:center; justify-content:flex-end; gap:10px; padding:12px 16px 0; max-width:440px; margin:0 auto; }
  #user-avatar { width:28px; height:28px; border-radius:99px; background:linear-gradient(135deg,var(--gold),var(--orange)); display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:14px; color:#0d0b14; }
  #user-name { font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); }
  #signout-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:4px 10px; color:var(--faint); font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; }

  /* Scrollbar hide */
  ::-webkit-scrollbar { display:none; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" style="display:flex">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--gold);letter-spacing:.05em;line-height:1">Life<br>Dashboard</div>
  <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--dim);text-align:center;max-width:260px">Sign in to sync your goals and fitness data across all your devices</div>
  <button onclick="signInGoogle()" style="display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:14px 24px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;cursor:pointer;margin-top:8px">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="user-bar">
    <div id="user-avatar">?</div>
    <div id="user-name"></div>
    <button id="signout-btn" onclick="signOutUser()">Sign out</button>
  </div>
  <div id="main-content"></div>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="daily" onclick="switchTab('daily')"><span>🗓</span>Daily</button>
    <button class="tab-btn" data-tab="fitness" onclick="switchTab('fitness')"><span>🏋️</span>Fitness</button>
  </div>
</div>

</body>
</html>
